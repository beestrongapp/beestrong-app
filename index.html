<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BeeStrong Gym Tracker">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<title>BeeStrong Gym Tracker</title>
<style>
:root {
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --accent:#c9a96e;--accent-dim:rgba(201,169,110,0.12);--accent-dim2:rgba(201,169,110,0.22);
  --text:#ffffff;--text2:#a0a0a0;--text3:#666;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --red:#ff5c5c;--yellow:#f5c542;--radius:12px;--radius-lg:16px;
}
body.light {
  --bg:#f0f0f0;--bg2:#e4e4e4;--bg3:#d8d8d8;--bg4:#cccccc;
  --accent:#31405c;--accent-dim:rgba(49,64,92,0.12);--accent-dim2:rgba(49,64,92,0.22);
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --btn-text:#f0f0f0;
}
:root {
  --btn-text:#000;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;transition:background 0.2s,color 0.2s;}
.shell{display:flex;height:100dvh;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding-top:env(safe-area-inset-top);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.logo{display:flex;align-items:center;gap:10px;padding:20px 20px 24px;}
.logo-icon{width:36px;height:36px;overflow:hidden;border-radius:10px;}
.logo-icon img{width:100%;height:100%;object-fit:cover;}
.logo-name{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;}
.nav-section{padding:0 10px;flex:1;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.15s;margin-bottom:2px;user-select:none;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.sidebar-bottom{padding:16px 10px;padding-bottom:calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);}
.screen{display:none;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));overflow-y:auto;height:100%;}
.screen.active{display:block;}
.screen-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-top:env(safe-area-inset-top);}
.screen-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
.screen-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));z-index:100;}
.mobile-nav-inner{display:flex;}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 2px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:500;transition:color 0.15s;min-height:56px;}
.mobile-nav-item.active{color:var(--accent);}
.mobile-nav-item svg{width:26px;height:26px;}
.lang-btn{flex-direction:row;gap:2px;padding:8px 3px;}
.btn-new{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:var(--btn-text);font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;transition:opacity 0.15s;user-select:none;white-space:nowrap;}
.btn-new:active{opacity:0.8;transform:scale(0.97);}
.btn{display:block;width:100%;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text);text-align:center;transition:all 0.12s;font-family:inherit;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:var(--btn-text);border:none;}
.btn-danger{color:var(--red);border-color:rgba(255,92,92,0.25);}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-flex;align-items:center;gap:5px;}
.btn-ghost{background:var(--bg3);border-color:var(--border);color:var(--text2);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;}
.stat-icon{width:28px;height:28px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;}
.stat-icon svg{width:14px;height:14px;color:var(--accent);}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1;}
.stat-unit{font-size:12px;color:var(--text2);margin-top:3px;}
.section-label{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text);}
.workout-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.workout-row:active{border-color:var(--border2);background:var(--bg3);}
.workout-row-icon{width:38px;height:38px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.workout-row-icon svg{width:18px;height:18px;color:var(--accent);}
.workout-row-name{font-size:14px;font-weight:600;}
.workout-row-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:0.3px;display:inline-block;margin:1px 2px;}
.tag-upper{background:rgba(201,169,110,0.15);color:var(--accent);}
.tag-lower{background:rgba(245,197,66,0.12);color:var(--yellow);}
.tag-fbw{background:rgba(100,200,255,0.12);color:#64c8ff;}
.tag-chest{background:rgba(255,120,120,0.12);color:#ff7878;}
.tag-back{background:rgba(120,200,120,0.12);color:#78c878;}
.tag-biceps{background:rgba(200,120,255,0.12);color:#c878ff;}
.tag-triceps{background:rgba(255,180,80,0.12);color:#ffb450;}
.tag-legs{background:rgba(80,180,255,0.12);color:#50b4ff;}
.tag-glutes{background:rgba(255,100,180,0.12);color:#ff64b4;}
.tag-abs{background:rgba(180,220,100,0.12);color:#b4dc64;}
.tag-other{background:rgba(160,160,160,0.12);color:#aaa;}
.tpl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;}
.tpl-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.tpl-name{font-size:16px;font-weight:700;}
.tpl-meta{font-size:12px;color:var(--text2);margin-top:3px;}
.tpl-exercises{border-top:1px solid var(--border);padding-top:12px;}
.tpl-ex-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--text2);}
.tpl-ex-row span.name{color:var(--text);flex:1;}
.super-tag{font-size:9px;padding:2px 6px;border-radius:6px;background:var(--accent-dim);color:var(--accent);font-weight:700;flex-shrink:0;}
.workout-header{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.ex-card.super{border-color:var(--accent-dim2);background:rgba(201,169,110,0.04);}
.ex-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.set-grid{display:grid;grid-template-columns:22px 1fr 1fr 1fr 1fr 40px 30px;gap:5px;align-items:center;margin-bottom:7px;}
.set-grid-labels{display:grid;grid-template-columns:22px 1fr 1fr 1fr 1fr 40px 30px;gap:5px;margin-bottom:6px;}
.set-lbl{font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:0.4px;}
.set-num{font-size:12px;color:var(--text3);text-align:center;}
.set-done{width:40px;height:40px;border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;background:none;color:var(--text3);transition:all 0.15s;}
.set-done.completed{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
input.si{width:100%;padding:9px 4px;text-align:center;font-size:14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;-webkit-appearance:none;}
input.si:focus{outline:none;border-color:var(--accent);}
.rm-btn{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0;width:30px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:color 0.15s;font-family:inherit;}
.rm-btn:active{color:var(--red);}
.timer-bar{background:var(--accent-dim);border:1px solid var(--accent-dim2);border-radius:var(--radius-lg);padding:20px;margin:10px 0;text-align:center;}
.timer-display{font-size:52px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-3px;line-height:1;}
.timer-label{font-size:12px;color:var(--accent);opacity:0.7;margin-top:6px;}
input[type=text],input[type=number],input[type=date]{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;font-size:15px;color:var(--text);width:100%;font-family:inherit;-webkit-appearance:none;transition:border-color 0.15s;}
input:focus{outline:none;border-color:var(--accent);}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.4px;}
.type-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.type-chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit;user-select:none;}
.type-chip.active{background:var(--accent);color:var(--btn-text);border-color:var(--accent);font-weight:700;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric-card{background:var(--bg3);border-radius:var(--radius);padding:14px;}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
.metric-value{font-size:26px;font-weight:700;letter-spacing:-1px;}
.delta-up{color:var(--accent);font-size:12px;margin-top:3px;}
.delta-down{color:var(--red);font-size:12px;margin-top:3px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;z-index:200;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-height:92dvh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px;}
.modal-back{display:flex;align-items:center;gap:8px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:inherit;padding:0;}
.ex-picker-group{margin-bottom:20px;}
.ex-picker-group-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.ex-picker-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.ex-picker-item.selected{border-color:var(--accent);background:var(--accent-dim);}
.ex-thumb{width:48px;height:48px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.ex-info{flex:1;}
.ex-info-name{font-size:13px;font-weight:600;color:var(--text);}
.ex-info-group{font-size:11px;color:var(--text2);margin-top:2px;}
.ex-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:11px;font-weight:700;}
.ex-picker-item.selected .ex-check{background:var(--accent);border-color:var(--accent);color:#000;}
.ex-info-btn{width:36px;height:36px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-family:inherit;padding:0;transition:background 0.15s;}
.ex-info-btn:hover{background:var(--bg2);}
.ex-info-btn:active{transform:scale(0.93);}
.measure-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;}
.measure-icon{width:34px;height:34px;border-radius:9px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.measure-info{flex:1;}
.measure-name{font-size:13px;font-weight:600;}
.measure-val{font-size:20px;font-weight:700;color:var(--accent);}
.measure-unit{font-size:11px;color:var(--text2);}
.measure-date{font-size:11px;color:var(--text3);margin-top:2px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
#calLabel{font-size:22px;font-weight:700;letter-spacing:-0.4px;text-transform:capitalize;}
.cal-nav-btn{background:none;border:none;width:44px;height:44px;cursor:pointer;color:var(--accent);display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.15s;font-family:inherit;padding:0;}
.cal-nav-btn:hover{background:var(--bg3);}
.cal-nav-btn:active{background:var(--bg4);transform:scale(0.94);}
.cal-stats{display:flex;gap:18px;font-size:12px;color:var(--text3);margin:0 0 18px 4px;}
.cal-stats span{display:inline-flex;align-items:baseline;gap:5px;}
.cal-stats strong{color:var(--text);font-size:13px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px;}
.cal-day-label{text-align:center;font-size:10px;color:var(--text3);padding:6px 0 10px;letter-spacing:0.8px;text-transform:uppercase;font-weight:700;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:11px;font-size:14px;cursor:pointer;position:relative;transition:transform 0.12s, background 0.15s;color:var(--text2);background:transparent;font-weight:500;}
.cal-day:hover{background:var(--bg3);}
.cal-day:active{transform:scale(0.93);}
.cal-day.has-workout{background:var(--bg3);color:var(--text);font-weight:600;}
.cal-day.has-workout::after{content:'';position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 1px var(--bg3);}
.cal-day.today{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent);font-weight:700;}
.cal-day.selected{background:var(--accent)!important;color:var(--btn-text)!important;font-weight:700;box-shadow:none!important;}
.cal-day.selected::after{background:var(--btn-text);box-shadow:none;}
.cal-day.empty{pointer-events:none;}
.progress-tpl-btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;cursor:pointer;margin-right:8px;margin-bottom:8px;font-family:inherit;transition:all 0.12s;}
.progress-tpl-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.save-pill{position:fixed;top:calc(14px + env(safe-area-inset-top));right:14px;font-size:12px;padding:7px 14px;border-radius:20px;background:var(--accent);color:#000;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:300;}
.save-pill.show{opacity:1;}
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:14px;color:var(--text2);}
.spinner{width:26px;height:26px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#screen-dashboard{position:relative;}
#screen-dashboard::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(95vw,560px);height:min(95vw,560px);background:var(--dash-logo-bg, url('./logo.jpg')) center/contain no-repeat;opacity:0.75;pointer-events:none;z-index:0;}
#screen-dashboard > *{position:relative;z-index:1;}
body:not(.light) #screen-dashboard::before{background:url('./logo.jpg') center/contain no-repeat;}
body.light #screen-dashboard::before{background:url('./light_logo.png') center/contain no-repeat;}
.theme-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;background:none;border:none;color:var(--text2);font-size:13px;font-weight:500;font-family:inherit;width:100%;transition:background 0.15s;}
.theme-toggle:hover{background:var(--bg3);}
.toggle-track{width:36px;height:20px;border-radius:10px;background:var(--bg4);border:1px solid var(--border2);position:relative;transition:background 0.2s;flex-shrink:0;margin-left:auto;}
.toggle-track.on{background:var(--accent);}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:3px;transition:transform 0.2s;}
.toggle-track.on .toggle-thumb{transform:translateX(16px);}
.dash-header-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
/* Dashboard bottom action bar — mobile only */
.dash-action-bar{display:none;position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));left:0;right:0;padding:10px 14px;background:linear-gradient(to top, var(--bg) 70%, transparent);z-index:90;gap:10px;}
.dash-action-bar.visible{display:flex;}
.workout-actions-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--border);z-index:101;gap:8px;display:flex;}
.workout-action-btn{flex:1;padding:15px 6px;font-size:14px;font-weight:700;border-radius:12px;border:1px solid var(--border2);background:none;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.12s;}
.workout-action-btn:active{transform:scale(0.97);}
.workout-action-btn.primary{background:var(--accent);color:var(--btn-text);border:none;}
.workout-action-btn.danger{color:var(--red);border-color:rgba(255,92,92,0.25);}
@media(min-width:601px){.workout-actions-bar{left:220px;}}
@media(max-width:600px){
  .sidebar{display:none;}
  .mobile-nav{display:flex;}
  .screen{padding:16px;padding-bottom:calc(140px + env(safe-area-inset-bottom));}
  .screen-title{font-size:22px;}
  .stats-grid{gap:8px;}
  .stat-value{font-size:20px;}
  .dash-header-btns{display:none;}
}
</style>
</head>
<body>
<div class="save-pill" id="savePill">Saved ✓</div>
<div class="shell">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon"><img id="logoImg" src="./logo.jpg" alt="logo"/></div>
      <span class="logo-name">BeeStrong Gym Tracker</span>
    </div>
    <div class="nav-section">

let lang=localStorage.getItem('bs-lang')||'en';
function t(k){return T[lang][k]||k;}
// Inline 4-language picker for ad-hoc strings (cleaner than nested ternary)
function tt(o){return (o&&typeof o==='object')?(o[lang]||o.en||o.pl||''):o;}
// Workout display name — translates known nameKeys, falls back to stored .name
function displayWorkoutName(w){
  if(!w)return'';
  if(w.nameKey)return t(w.nameKey)||w.name||'';
  // Backward compat: detect legacy hard-coded names from earlier saves
  const n=w.name||'';
  if(n==='Quick Workout'||n==='Szybki trening'||n==='Schnelles Training'||n==='Entrenamiento rápido')return t('quickWorkout');
  if(n==='Custom Workout'||n==='Własny trening'||n==='Eigenes Training'||n==='Entrenamiento personalizado')return tt({pl:'Własny trening',en:'Custom Workout',de:'Eigenes Training',es:'Entrenamiento personalizado'});
  return n;
}

function setLang(l){
  lang=l;localStorage.setItem('bs-lang',l);
  applyLang();
  renderDashboard();renderCalendar();renderTemplates();renderWorkout();renderProgress();renderProfile();renderSettings();
}
function applyLang(){
  document.querySelectorAll('[data-key]').forEach(el=>{const k=el.dataset.key;if(T[lang][k])el.textContent=T[lang][k];});
  document.querySelectorAll('.nav-label[data-key]').forEach(el=>el.textContent=t(el.dataset.key));
  const ids={lblNewWorkout:'newWorkout',lblRecentWorkouts:'recentWorkouts',lblNewTemplate:'newTemplate',titleTemplates:'templates',dashTitle:'dashboard',lblAddMeasure:'addMeasure',lblQuickWorkout:'quickWorkout',lblQuickWorkoutDesk:'quickWorkout',lblNewWorkoutDesk:'newWorkout',settingsTitle:'settings'};
  Object.entries(ids).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=t(key);});
  // Welcome greeting on Dashboard — overrides dashTitle if user has a name
  const name=(localStorage.getItem('bs-username')||'').trim();
  const dashEl=document.getElementById('dashTitle');
  if(dashEl&&name){
    const greet={pl:'Cześć',en:'Hi',de:'Hallo',es:'Hola'}[lang]||'Hi';
    dashEl.textContent=`${greet}, ${name}`;
  }
  const tl=document.getElementById('themeLabel');if(tl)tl.textContent=isDark?t('lightMode'):t('darkMode');
}

let isDark=localStorage.getItem('bs-theme')!=='light';
function applyTheme(){
  document.body.classList.toggle('light',!isDark);
  const tr=document.getElementById('toggleTrack');const lb=document.getElementById('themeLabel');
  if(tr)tr.classList.toggle('on',!isDark);
  if(lb)lb.textContent=isDark?t('lightMode'):t('darkMode');
  // Switch logo
  const logoImg=document.getElementById('logoImg');
  if(logoImg) logoImg.src=isDark?'./logo.jpg':'./light_logo.png';
  // Switch dashboard background
  const dash=document.getElementById('screen-dashboard');
  if(dash){
    const bg=isDark?`url('./logo.jpg')`:`url('./light_logo.png')`;
    dash.style.setProperty('--dash-bg',bg);
  }

}
function toggleTheme(){isDark=!isDark;localStorage.setItem('bs-theme',isDark?'dark':'light');applyTheme();}

const EXDB_CACHE_TTL=14*24*60*60*1000; // 14 days

// Clear old cache versions

const FEDB_BASE='https://raw.githubusercontent.com/yuhonas/free-exercise-db/main';
const FEDB_JSON_URL=FEDB_BASE+'/dist/exercises.json';
const FEDB_IMG_BASE=FEDB_BASE+'/exercises/';

async function fetchExerciseDb(){
  try{
    const cached=JSON.parse(localStorage.getItem(EXDB_CACHE_KEY)||'null');
    if(cached&&cached.ts&&Date.now()-cached.ts<EXDB_CACHE_TTL){
      exDbCache=cached.data;return exDbCache;
    }
  }catch(e){}
  try{
    const resp=await fetch(FEDB_JSON_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const all=await resp.json();
    const groups={};
    const seenPerGroup={};
    for(const ex of all){
      if(!ex||!ex.name)continue;
      if(SKIP_FEDB_CATEGORIES.has(ex.category))continue;
      const primary=(ex.primaryMuscles||[])[0];
      const gk=FEDB_MUSCLE_MAP[primary];
      if(!gk)continue;
      // Dedupe by normalized name within group
      const norm=ex.name.toLowerCase().replace(/[^a-z0-9]/g,'');
      if(!seenPerGroup[gk])seenPerGroup[gk]=new Set();
      if(seenPerGroup[gk].has(norm))continue;
      seenPerGroup[gk].add(norm);
      if(!groups[gk]){
        const lbl=GROUP_LABELS[gk]||{pl:gk,en:gk,de:gk,es:gk};
        groups[gk]={pl:lbl.pl,en:lbl.en,de:lbl.de||lbl.en,es:lbl.es||lbl.en,items:[]};
      }
      const imgs=Array.isArray(ex.images)?ex.images.map(p=>FEDB_IMG_BASE+p):[];
      groups[gk].items.push({
        id:'f_'+ex.id,
        en:ex.name,
        pl:ex.name,
        img:imgs[0]||null,
        imgs,
        gk,
        equipment:ex.equipment||'other',
        level:ex.level||null,
        force:ex.force||null,
        mechanic:ex.mechanic||null,
        instructions:Array.isArray(ex.instructions)?ex.instructions:[],
      });
    }
    Object.values(groups).forEach(g=>g.items.sort((a,b)=>a.en.localeCompare(b.en)));
    exDbCache={groups};
    try{localStorage.setItem(EXDB_CACHE_KEY,JSON.stringify({ts:Date.now(),data:exDbCache}));}catch(e){}
    return exDbCache;
  }catch(err){
    console.warn('Exercise DB fetch failed:',err);
    exDbCache=false;
    return false;
  }
}

function getExGroups(){
  if(exDbCache&&exDbCache.groups)return exDbCache.groups;
  return EX_GROUPS;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item[data-screen]').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const screens=['dashboard','workouts','calendar','exercises','programs','progress','templates','profile','settings'];
  const idx=screens.indexOf(name);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  const mBtn=document.querySelector(`.mobile-nav-item[data-screen="${name}"]`);
  if(mBtn)mBtn.classList.add('active');
  // Show bottom action bar only on dashboard
  const bar=document.getElementById('dashActionBar');
  if(bar)bar.classList.toggle('visible',name==='dashboard');
  if(name==='dashboard')renderDashboard();
  if(name==='calendar')renderCalendar();
  if(name==='exercises')renderExercises();
  if(name==='programs')renderPrograms();
  if(name==='progress')renderProgress();
  if(name==='templates')renderTemplates();
  if(name==='workouts')renderWorkout();
  if(name==='profile')renderProfile();
  if(name==='settings')renderSettings();
}

function typeTagHtml(types){
  if(!types||!types.length)return'';
  return types.map(tp=>`<span class="tag tag-${tp}">${t(tp)}</span>`).join('');
}

function renderDashboard(){
  const ws=weekStart(),we=new Date(ws);we.setDate(we.getDate()+6);
  const fmt=d=>`${d.getDate()} ${t('monthsShort')[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('dashWeekLabel').textContent=`${t('week')} ${fmt(ws)} — ${fmt(we)}`;
  const keys=Object.entries(S.workouts).filter(([k,w])=>{const d=new Date((w.date||k.split('_')[0]));return d>=ws&&d<=we;}).map(([k])=>k);
  const tm=keys.reduce((a,k)=>a+(S.workouts[k].duration||0),0);
  const tv=keys.reduce((a,k)=>a+(S.workouts[k].volume||0),0);
  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card" style="cursor:pointer;" onclick="showMonthChart()"><div class="stat-top"><span class="stat-label">${t('treningi')}</span><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4v16M18 4v16M3 12h18"/></svg></div></div><div class="stat-value">${keys.length}</div><div class="stat-unit">${t('workoutsThisWeek')}</div></div>
    <div class="stat-card" style="cursor:pointer;" onclick="showMonthChart()"><div class="stat-top"><span class="stat-label">${t('czas')}</span><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div></div><div class="stat-value">${tm}</div><div class="stat-unit">${t('minutes')}</div></div>
    <div class="stat-card" style="cursor:pointer;" onclick="showMonthChart()"><div class="stat-top"><span class="stat-label">${t('objetosc')}</span><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div></div><div class="stat-value">${tv>0?(tv/1000).toFixed(1):'0'}</div><div class="stat-unit">${t('tons')}</div></div>`;
  const recent=Object.entries(S.workouts).sort((a,b)=>{const da=a[1].date||a[0].split('_')[0];const db=b[1].date||b[0].split('_')[0];return db>da?1:db<da?-1:b[0]>a[0]?1:-1;}).slice(0,5);
  const el=document.getElementById('recentWorkouts');
  if(!recent.length){el.innerHTML=`<div class="empty-state">${t('noWorkouts')}</div>`;return;}
  el.innerHTML=recent.map(([k,w])=>{const dateStr=w.date||k.split('_')[0];const[y,m,d]=dateStr.split('-');return`<div class="workout-row" onclick="showWorkoutSummary('${k}')"><div class="workout-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M6 4v16M18 4v16M3 12h18M3 7h3M18 7h3M3 17h3M18 17h3"/></svg></div><div class="workout-row-info"><div class="workout-row-name">${displayWorkoutName(w)}</div><div class="workout-row-meta">${d}.${m}.${y} · ${w.duration} min · ${(w.volume/1000).toFixed(1)}t</div></div><div>${typeTagHtml(w.types)}</div></div>`;}).join('');
}

// ===== CALENDAR =====
function renderCalendar(){
  if(!S.loaded)return;
  document.getElementById('calLabel').textContent=t('months')[S.month]+' '+S.year;

  // Monthly stats: workouts count + total volume
  const monthPrefix=`${S.year}-${String(S.month+1).padStart(2,'0')}-`;
  const monthWorkouts=Object.entries(S.workouts).filter(([wk])=>wk.startsWith(monthPrefix));
  const wCount=monthWorkouts.length;
  const wVol=monthWorkouts.reduce((a,[,w])=>a+(w.volume||0),0);
  const isPL=lang==='pl';
  const statsEl=document.getElementById('calStats');
  if(statsEl){
    statsEl.innerHTML=wCount
      ?`<span><strong>${wCount}</strong> ${tt({pl:'treningi',en:'workouts',de:'Trainings',es:'entrenamientos'})}</span><span><strong>${(wVol/1000).toFixed(1)}t</strong> ${tt({pl:'wolumen',en:'volume',de:'Volumen',es:'volumen'})}</span>`
      :`<span style="color:var(--text3);">${tt({pl:'Brak treningów w tym miesiącu',en:'No workouts this month',de:'Keine Trainings in diesem Monat',es:'Sin entrenamientos este mes'})}</span>`;
  }

  const g=document.getElementById('calGrid');
  g.innerHTML=t('days').map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const first=new Date(S.year,S.month,1).getDay();
  const off=first===0?6:first-1;
  const days=new Date(S.year,S.month+1,0).getDate();
  const td=today();
  for(let i=0;i<off;i++)g.innerHTML+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const k=dk(S.year,S.month,d);
    const hasW=Object.keys(S.workouts).some(wk=>wk.startsWith(k));
    const cls=['cal-day',k===td?'today':'',hasW?'has-workout':'',S.selectedDate===k?'selected':''].filter(Boolean).join(' ');
    g.innerHTML+=`<div class="${cls}" onclick="selDay('${k}')">${d}</div>`;
  }
  renderDayDetail();
}
function selDay(k){S.selectedDate=k;renderCalendar();}
function renderDayDetail(){
  const el=document.getElementById('calDetail');if(!S.selectedDate){el.innerHTML='';return;}
  const dateKey=S.selectedDate;
  const[y,m,d]=dateKey.split('-');
  const dayWorkouts=Object.entries(S.workouts).filter(([wk])=>wk.startsWith(dateKey));

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px;">
    <div style="font-size:13px;color:var(--text2);">${d}.${m}.${y}</div>
    <button class="btn btn-sm btn-ghost" onclick="openManualWorkout('${dateKey}')" style="font-size:12px;">${tt({pl:'+ Dodaj trening',en:'+ Add workout',de:'+ Training hinzufügen',es:'+ Añadir entrenamiento'})}</button>
  </div>`;

  if(!dayWorkouts.length){
    html+=`<div style="font-size:13px;color:var(--text3);margin-bottom:10px;">${t('noRest')}</div>`;
  } else {
    dayWorkouts.sort((a,b)=>a[0]>b[0]?1:-1).forEach(([wk,w])=>{
      html+=`<div class="workout-row" onclick="showWorkoutSummary('${wk}')" style="margin-bottom:8px;">
        <div class="workout-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M6 4v16M18 4v16M3 12h18M3 7h3M18 7h3M3 17h3M18 17h3"/></svg></div>
        <div class="workout-row-info"><div class="workout-row-name">${displayWorkoutName(w)}</div><div class="workout-row-meta">${w.duration} min · ${(w.volume/1000).toFixed(1)}t</div></div>
        <div>${typeTagHtml(w.types)}</div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

        <button class="btn btn-primary" onclick="showPaywall('your_lifts')" style="max-width:240px;margin:0 auto;">${tt({pl:'Zobacz Pro',en:'See Pro',de:'Pro ansehen',es:'Ver Pro'})}</button>

  }
  const presentGks=getPresentMuscleGroups();

        <div style="position:relative;width:100%;height:120px;"><canvas id="liftChart_${i}"></canvas></div>

  const equipEl=document.getElementById('brwEquipChips');
  if(equipEl){
    if(!isPro()){equipEl.innerHTML='';equipEl.style.display='none';return;}
    const exGroups=getExGroups();
    const present=new Set();
    Object.values(exGroups).forEach(g=>g.items.forEach(it=>{if(it.equipment)present.add(it.equipment);}));
    const order=['barbell','dumbbell','machine','cable','body only','kettlebells','bands','e-z curl bar','medicine ball','exercise ball','foam roll','other'];
    const eqs=order.filter(k=>present.has(k));
    if(!eqs.length){equipEl.innerHTML='';equipEl.style.display='none';return;}
    equipEl.style.display='flex';
    const allLbl=lang==='pl'?'Cały sprzęt':(lang==='de'?'Alle Geräte':(lang==='es'?'Todo el equipo':'All equipment'));
    const chips=[
      `<button onclick="toggleBrowseEquip('__all__')" style="padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:${_browseEquip.size===0?'var(--accent-dim)':'none'};color:${_browseEquip.size===0?'var(--accent)':'var(--text2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">${allLbl}</button>`,
      ...eqs.map(eq=>{
        const lbl=(EQUIPMENT_LABELS[eq]||{en:eq,pl:eq})[lang]||eq;
        const isAct=_browseEquip.has(eq);
        const safeEq=eq.replace(/'/g,"\\'");
        return`<button onclick="toggleBrowseEquip('${safeEq}')" style="padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:${isAct?'var(--accent-dim)':'none'};color:${isAct?'var(--accent)':'var(--text2)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">${lbl}</button>`;
      })
    ].join('');
    equipEl.innerHTML=chips;
  }
}

function renderBrowseList(){
  const listEl=document.getElementById('brwList');
  if(!listEl)return;
  const exGroups=getExGroups();
  const gks=Object.keys(exGroups);
  let totalCount=0;
  const html=gks.map(gk=>{
    if(_browseGks.size>0&&!_browseGks.has(gk))return'';
    const grp=exGroups[gk];
    const label=grp[lang]||grp.pl||grp.en||gk;
    const items=grp.items.filter(e=>{
      if(_browseSearchQ&&!((e[lang]||e.pl||e.en||'').toLowerCase().includes(_browseSearchQ.toLowerCase())))return false;
      if(_browseEquip.size>0&&(!e.equipment||!_browseEquip.has(e.equipment)))return false;
      return true;
    });
    if(!items.length)return'';
    totalCount+=items.length;
    return'<div class="ex-picker-group"><div class="ex-picker-group-title">'+label+' <span style="color:var(--text3);font-weight:400;">('+items.length+')</span></div>'+items.map(e=>{
      const nm=e[lang]||e.pl||e.en||'';
      const safeId=String(e.id||'').replace(/'/g,"\\'");
      const eqLbl=e.equipment?((EQUIPMENT_LABELS[e.equipment]||{en:e.equipment,pl:e.equipment})[lang]||e.equipment):'';
      const subtitle=eqLbl?`${label} · ${eqLbl}`:label;
      return`<div class="ex-picker-item" onclick="showExerciseDetail('${safeId}','${gk}')">
        <div class="ex-thumb">${e.img?`<img src="${e.img}" style="width:48px;height:48px;object-fit:contain;border-radius:6px;" loading="lazy"/>`:`${exSvgByGroup(gk)}`}</div>
        <div class="ex-info"><div class="ex-info-name">${nm}</div><div class="ex-info-group">${subtitle}</div></div>
        <div style="color:var(--accent);font-size:18px;flex-shrink:0;padding:0 4px;">›</div>
      </div>`;
    }).join('')+'</div>';
  }).join('');
  const noResults=lang==='pl'?'Brak wyników':(lang==='de'?'Keine Ergebnisse':(lang==='es'?'Sin resultados':'No results'));
  listEl.innerHTML=html||`<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px;">${noResults}</div>`;
}

window.toggleBrowseGk=gk=>{
  if(gk==='__all__'){_browseGks.clear();}
  else{if(_browseGks.has(gk))_browseGks.delete(gk);else _browseGks.add(gk);}
  renderBrowseChips();renderBrowseList();
};
window.toggleBrowseEquip=eq=>{
  if(eq==='__all__'){_browseEquip.clear();}
  else{if(_browseEquip.has(eq))_browseEquip.delete(eq);else _browseEquip.add(eq);}
  renderBrowseChips();renderBrowseList();
};
window.onBrowseSearch=q=>{_browseSearchQ=q;renderBrowseList();};

// ===== PROGRAMS =====
let _expandedProgramId=null;

function localizedField(p,field){
  const v=p[field];
  if(!v)return'';
  if(typeof v==='string')return v;
  return v[lang]||v.en||v.pl||'';
}

function renderPrograms(){
  const el=document.getElementById('programsContent');
  if(!el)return;
  const isPL=lang==='pl';
  const levelLabels={
    beginner:tt({pl:'Początkujący',en:'Beginner',de:'Anfänger',es:'Principiante'}),
    intermediate:tt({pl:'Średniozaawansowany',en:'Intermediate',de:'Fortgeschritten',es:'Intermedio'}),
    advanced:tt({pl:'Zaawansowany',en:'Advanced',de:'Fortgeschritten+',es:'Avanzado'}),

  const cards=allPrograms.map(p=>{
    const expanded=_expandedProgramId===p.id;

    const lvlColor={beginner:'#7ec77e',intermediate:'#e6c98c',advanced:'#e88a8a'}[p.level]||'var(--text3)';
    const tpls=p.templates||[];
    const exercisesHtml=expanded?tpls.map((tp,ti)=>`
      <div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;">
          <div style="font-size:14px;font-weight:700;flex:1;">${tp.name}</div>
          <button class="btn btn-sm btn-primary" onclick='startProgramWorkout("${p.id}",${ti})' style="font-size:12px;padding:7px 14px;flex-shrink:0;">${t('startTemplate')}</button>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">${tp.exercises.length} ${t('exExercises')} · ${t('exRest')} ${tp.restDefault}s</div>
        ${tp.exercises.map(e=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:4px 0;border-top:1px solid var(--border);"><span style="flex:1;padding-right:8px;">${e.sup?'<span style="color:#7ec77e;font-weight:700;font-size:10px;">SS </span>':''}${exName(e)}</span><span style="color:var(--text3);flex-shrink:0;">${e.sets}×${e.reps}${e.weight?' · '+e.weight+'kg':''}</span></div>`).join('')}
      </div>`).join(''):'';

    return `<div class="tpl-card" style="cursor:pointer;" onclick='toggleProgramExpand("${p.id}")'>
      <div class="tpl-card-header">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <div class="tpl-name">${localizedField(p,'name')}</div>
            ${p.builtin?`<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;">${tt({pl:'Wbudowany',en:'Built-in',de:'Eingebaut',es:'Integrado'})}</span>`:''}
            <span style="font-size:11px;color:${lvlColor};font-weight:600;">●&nbsp;${lvlLbl}</span>
          </div>
          <div class="tpl-meta">${p.daysPerWeek}× ${tt({pl:'tyg.',en:'/wk',de:'/Wo.',es:'/sem.'})} · ${p.duration} ${tt({pl:'tyg.',en:'wks',de:'Wo.',es:'sem.'})} · ${tpls.length} ${t('exExercises')}</div>
        </div>
        <div style="font-size:22px;color:var(--text3);flex-shrink:0;transform:rotate(${expanded?'90':'0'}deg);transition:transform 0.2s;">›</div>
      </div>
      ${expanded?`<div onclick="event.stopPropagation();" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.55;">${localizedField(p,'description')}</div>
        ${exercisesHtml}
      </div>`:''}
    </div>`;
  }).join('');

  el.innerHTML=introHtml+cards;
}

window.toggleProgramExpand=function(pid){
  _expandedProgramId=(_expandedProgramId===pid)?null:pid;
  renderPrograms();
};
window.startProgramWorkout=function(pid,tidx){
  const userPrograms=Array.isArray(S.programs)?S.programs:[];
  const allPrograms=[...BUILTIN_PROGRAMS,...userPrograms];
  const p=allPrograms.find(x=>x.id===pid);
  if(!p||!p.templates||!p.templates[tidx])return;
  const tp=p.templates[tidx];
  // Build a transient template object for startWorkout (it accepts template objects directly)
  startWorkout({
    id:null,
    name:tp.name,
    types:tp.types||[],
    restDefault:tp.restDefault||90,
    exercises:tp.exercises.map(e=>({...e})),
  });
};

  el.innerHTML=S.templates.map(tp=>`<div class="tpl-card"><div class="tpl-card-header"><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><div class="tpl-name">${tp.name}</div>${typeTagHtml(tp.types||[])}</div><div class="tpl-meta">${tp.exercises.length} ${t('exExercises')} · ${t('exRest')} ${tp.restDefault}s</div></div><div style="display:flex;gap:6px;flex-shrink:0;"><button class="btn btn-sm btn-primary" onclick="startWorkout(${tp.id})">${t('startTemplate')}</button><button class="btn btn-sm btn-ghost" onclick="editTemplate(${tp.id})">${t('editTemplate')}</button></div></div><div class="tpl-exercises">${tp.exercises.map(e=>`<div class="tpl-ex-row">${e.sup?'<span class="super-tag">SS</span>':'<span style="width:20px;display:inline-block;flex-shrink:0;"></span>'}<span class="name">${exName(e)}</span><span>${e.sets}×${e.reps}${e.weight?' · '+e.weight+'kg':''}</span></div>`).join('')}</div></div>`).join('');

function openNewTemplate(){
  // Free tier: max 3 templates
  if(!isPro()&&S.templates.length>=3){showPaywall('template_limit');return;}
  showTplModal(null);
}
function editTemplate(id){showTplModal(id);}

function showTplModal(id){
  const orig=id?S.templates.find(x=>x.id===id):null;
  const tData={id:orig?orig.id:Date.now(),name:orig?orig.name:'',types:orig?(orig.types||[]):['upper'],restDefault:orig?orig.restDefault:90,exercises:orig?JSON.parse(JSON.stringify(orig.exercises)):[]};
  let curTypes=[...tData.types];
  let exs=[...tData.exercises];
  closeModal();
  const ov=document.createElement('div');ov.className='modal-overlay';

  function renderTplModal(){
    const chips=TYPE_LIST.map(tp=>`<button class="type-chip ${curTypes.includes(tp)?'active':''}" onclick="toggleType('${tp}')">${t(tp)}</button>`).join('');

    function exRow(e,i){
      // setRows: initialise to 1 row if not yet set
      if(!e.setRows){
        e.setRows=[{reps:e.reps||10,weight:e.weight||0}];
      }
      const setArr=e.setRows;
      let setRows='';
      setArr.forEach((s,si)=>{
        setRows+=`<div style="display:grid;grid-template-columns:20px 1fr 1fr;gap:6px;align-items:center;margin-top:6px;">
          <div style="font-size:11px;color:var(--text3);text-align:center;">${si+1}</div>
          <input class="si" type="number" placeholder="${t('reps')}" value="${s.reps}" oninput="updSetVal(${i},${si},'reps',this.value)" style="font-size:13px;padding:7px 4px;"/>
          <input class="si" type="number" placeholder="${t('kg')}" value="${s.weight}" oninput="updSetVal(${i},${si},'weight',this.value)" style="font-size:13px;padding:7px 4px;"/>
        </div>`;
      });

      const addLabel=lang==='pl'?'Dodaj serię +':'Add set +';
      const rmLabel=lang==='pl'?'Usuń serię −':'Remove set −';

      return`<div style="border:1px solid ${e.sup?'var(--accent-dim2)':'var(--border)'};border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg3);">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:13px;font-weight:600;">${e.sup?'<span class="super-tag">SS</span> ':''}${exName(e)}</div>
          <button onclick="rmEx(${i})" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0;font-family:inherit;line-height:1;">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:20px 1fr 1fr;gap:6px;margin-top:8px;">
          <div></div>
          <div style="font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;">${t('reps')}</div>
          <div style="font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;">${t('kg')}</div>
        </div>
        ${setRows}
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button onclick="addSetRow(${i})" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">${addLabel}</button>
          ${setArr.length>1?`<button onclick="rmSetRow(${i})" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,92,92,0.25);background:rgba(255,92,92,0.07);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">${rmLabel}</button>`:''}
        </div>
      </div>`;
    }

    ov.innerHTML=`<div class="modal"><div class="modal-handle"></div>
      <div class="modal-title">${id?t('editTemplate')+': '+tData.name:t('newTemplate')}</div>
      <label class="form-label">${t('templateName')}</label>
      <div style="margin-bottom:12px;"><input type="text" id="tName" value="${tData.name}" placeholder="np. Upper A"/></div>
      <div id="nameError" style="display:none;color:var(--red);font-size:12px;margin:-8px 0 10px;">${lang==='pl'?'Wpisz nazwę szablonu':'Please enter a template name'}</div>
      <label class="form-label">${t('templateType')}</label>
      <div class="type-chips">${chips}</div>
      <label class="form-label">${t('templateRest')}</label>
      <div style="margin-bottom:16px;"><input type="number" id="tRest" value="${tData.restDefault}" style="width:110px"/></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:14px;font-weight:600;">${t('exercises')} (${exs.length})</span>
        <button class="btn btn-sm btn-ghost" onclick="openExPicker()">${t('addExercise')}</button>
      </div>
      <div id="exList">${exs.map((e,i)=>exRow(e,i)).join('')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;">
        <button class="btn btn-ghost" onclick="closeModal()">${t('cancelTemplate')}</button>
        <button class="btn btn-primary" onclick="saveTpl()">${t('saveTemplate')}</button>
      </div>
      ${id?`<button class="btn btn-danger" style="margin-top:8px;" onclick="delTpl(${id})">${t('deleteTemplate')}</button>`:''}
    </div>`;
  }

  window.toggleType=tp=>{const i=curTypes.indexOf(tp);if(i>=0)curTypes.splice(i,1);else curTypes.push(tp);renderTplModal();};
  window.rmEx=i=>{exs.splice(i,1);renderTplModal();};
  window.updSetVal=(ei,si,field,val)=>{
    if(!exs[ei].setRows){
      const sets=exs[ei].sets||3;
      exs[ei].setRows=Array.from({length:sets},()=>({reps:exs[ei].reps||10,weight:exs[ei].weight||0}));
    }
    exs[ei].setRows[si][field]=+val;
  };
  window.addSetRow=ei=>{
    if(!exs[ei].setRows){
      exs[ei].setRows=Array.from({length:exs[ei].sets||3},()=>({reps:exs[ei].reps||10,weight:exs[ei].weight||0}));
    }
    const last=exs[ei].setRows[exs[ei].setRows.length-1];
    exs[ei].setRows.push({reps:last.reps,weight:last.weight});
    exs[ei].sets=exs[ei].setRows.length;
    renderTplModal();
  };
  window.rmSetRow=ei=>{
    if(!exs[ei].setRows||exs[ei].setRows.length<=1)return;
    exs[ei].setRows.pop();
    exs[ei].sets=exs[ei].setRows.length;
    renderTplModal();
  };
  window.openExPicker=()=>{
    const nameEl=document.getElementById('tName');
    const restEl=document.getElementById('tRest');
    if(nameEl)tData.name=nameEl.value;
    if(restEl)tData.restDefault=+restEl.value;
    showExPicker(exs,picked=>{
      // initialise setRows to 1 row for newly picked exercises
      picked.forEach(e=>{
        if(!e.setRows) e.setRows=[{reps:e.reps||10,weight:e.weight||0}];
      });
      exs=picked;
      closeModal();
      document.body.appendChild(ov);
      S.modal=ov;
      renderTplModal();
    });
  };
  window.saveTpl=()=>{
    const name=document.getElementById('tName').value.trim();
    if(!name){
      const errEl=document.getElementById('nameError');
      if(errEl){errEl.style.display='block';document.getElementById('tName').focus();}
      return;
    }
    const rest=+document.getElementById('tRest').value;
    // Persist setRows back into sets/reps/weight
    const finalExs=exs.map(e=>{
      if(e.setRows&&e.setRows.length){
        return{...e,sets:e.setRows.length,reps:e.setRows[0].reps,weight:e.setRows[0].weight};
      }
      return e;
    });
    const newT={id:tData.id,name,types:curTypes,restDefault:rest,exercises:finalExs};
    if(id){const i=S.templates.findIndex(x=>x.id===id);S.templates[i]=newT;}else S.templates.push(newT);
    closeModal();renderTemplates();saveAll();
  };
  window.delTpl=tid=>{S.templates=S.templates.filter(x=>x.id!==tid);closeModal();renderTemplates();saveAll();};
  renderTplModal();
  document.body.appendChild(ov);S.modal=ov;
  S._tplRender=renderTplModal;
}

// ===== EXERCISE PICKER =====
function showExPicker(currentExs,onConfirm){
  const selected=new Map(currentExs.map(e=>[e.pl||e.en||e.name,{...e}]));
  let searchQ='';
  let activeGks=new Set();
  let activeEquip=new Set();
  closeModal();
  const ov=document.createElement('div');ov.className='modal-overlay';

  function thumbHtml(e,gk){
    if(e.img){
      const svgFallback=exSvgByGroup(gk).replace(/`/g,'\`');
      return`<img src="${e.img}" style="width:48px;height:48px;object-fit:contain;border-radius:6px;background:var(--bg4);" loading="lazy" onerror="this.outerHTML=\`${svgFallback}\`"/>`;
    }
    return exSvgByGroup(gk);
  }

  function updateList(){
    const listEl=document.getElementById('exPickerList');
    const cntEl=document.getElementById('exPickerCount');
    if(!listEl)return;
    if(exDbCache===null){
      listEl.innerHTML=`<div style="text-align:center;padding:32px;color:var(--text2);"><div class="spinner" style="margin:0 auto 12px;"></div><div style="font-size:13px;">${lang==='pl'?'Ładowanie ćwiczeń z bazy danych...':'Loading exercises from database...'}</div></div>`;
      if(cntEl)cntEl.textContent=`${t('confirmSelected')} (${selected.size})`;
      return;
    }
    const exGroups=getExGroups();
    const gks=Object.keys(exGroups);
    const html=gks.map(gk=>{
      if(activeGks.size>0&&!activeGks.has(gk))return'';
      const grp=exGroups[gk];
      const label=grp[lang]||grp.pl||grp.en||gk;
      const items=grp.items.filter(e=>{
        if(searchQ&&!((e[lang]||e.pl||e.en||'').toLowerCase().includes(searchQ.toLowerCase())))return false;
        if(activeEquip.size>0&&!activeEquip.has(e.equipment))return false;
        return true;
      });
      if(!items.length)return'';
      return'<div class="ex-picker-group"><div class="ex-picker-group-title">'+label+'</div>'+items.map(e=>{
        const nm=e[lang]||e.pl||e.en||'';
        const key=e.pl||e.en;
        const isSel=selected.has(key);
        const safeId=(e.id||'').toString().replace(/'/g,"\'");
        return`<div class="ex-picker-item ${isSel?'selected':''}" onclick="toggleExPick('${safeId}','${gk}')">
          <div class="ex-thumb">${e.img?`<img src="${e.img}" style="width:48px;height:48px;object-fit:contain;border-radius:6px;" loading="lazy"/>`:`${exSvgByGroup(gk)}`}</div>
          <div class="ex-info"><div class="ex-info-name">${nm}</div><div class="ex-info-group">${label}</div></div>
          <button class="ex-info-btn" onclick="event.stopPropagation();showExerciseDetail('${safeId}','${gk}')" aria-label="Details"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          <div class="ex-check">${isSel?'✓':''}</div>
        </div>`;
      }).join('')+'</div>';
    }).join('');
    listEl.innerHTML=html||`<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px;">${lang==='pl'?'Brak wyników':'No results'}</div>`;
    if(cntEl)cntEl.textContent=`${t('confirmSelected')} (${selected.size})`;
  }

  function renderFilterChips(){
    const chipsEl=document.getElementById('exFilterChips');
    if(!chipsEl)return;
    const exGroups=getExGroups();

// Find an exercise in the loaded DB (or offline fallback) by id; optional gk hint speeds it up.
function findExerciseById(id,gkHint){
  const groups=getExGroups();
  if(gkHint&&groups[gkHint]){
    const f=groups[gkHint].items.find(e=>String(e.id)===String(id));
    if(f)return{e:f,gk:gkHint};
  }
  for(const gk of Object.keys(groups)){
    const f=groups[gk].items.find(e=>String(e.id)===String(id));
    if(f)return{e:f,gk};
  }
  return null;
}

// ===== PLATE CALCULATOR =====
const DEFAULT_PLATES_KG=[25,20,15,10,5,2.5,1.25];
const DEFAULT_BAR_KG=20;
function loadPlateConfig(){
  try{
    const saved=JSON.parse(localStorage.getItem('bs-plate-cfg-v1')||'null');
    if(saved&&Array.isArray(saved.plates)&&typeof saved.bar==='number')return saved;
  }catch(e){}
  return{plates:DEFAULT_PLATES_KG.slice(),bar:DEFAULT_BAR_KG};
}
function savePlateConfig(cfg){try{localStorage.setItem('bs-plate-cfg-v1',JSON.stringify(cfg));}catch(e){}}

function calcPlates(target,bar,plates){
  const perSide=(target-bar)/2;
  if(perSide<0)return{error:'lighter_than_bar'};
  const breakdown=[];
  let remaining=perSide;
  for(const p of [...plates].sort((a,b)=>b-a)){
    let count=0;
    while(remaining>=p-0.001){remaining=+(remaining-p).toFixed(3);count++;}
    if(count)breakdown.push({plate:p,count});
  }
  return{perSide,breakdown,remaining,exact:Math.abs(remaining)<0.01,actual:bar+(perSide-remaining)*2};
}

function showPlateCalc(initialWeight){
  closeModal();
  const cfg=loadPlateConfig();
  let target=+(initialWeight||60);
  let bar=cfg.bar;
  const ov=document.createElement('div');ov.className='modal-overlay';
  function render(){
    const r=calcPlates(target,bar,cfg.plates);
    let breakdownHtml='';
    if(r.error){
      breakdownHtml=`<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">${tt({pl:'Waga mniejsza niż sam gryf',en:'Weight is less than the bar',de:'Gewicht kleiner als die Stange',es:'Peso menor que la barra'})}</div>`;
    } else if(!r.breakdown.length){
      breakdownHtml=`<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">${tt({pl:'Sam gryf — bez talerzy',en:'Just the bar — no plates',de:'Nur die Stange — keine Scheiben',es:'Solo la barra — sin discos'})}</div>`;
    } else {
      const items=r.breakdown.map(({plate,count})=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><div style="font-size:15px;font-weight:600;">${plate}kg</div><div style="font-size:14px;color:var(--text2);">×${count}</div></div>`).join('');
      breakdownHtml=`<div style="font-size:12px;color:var(--text3);margin-bottom:6px;">${tt({pl:'Na każdą stronę gryfu',en:'Per side of the bar',de:'Pro Seite der Stange',es:'Por cada lado de la barra'})}:</div><div style="background:var(--bg3);border-radius:10px;padding:0 14px;">${items}</div>`;
      if(!r.exact){
        breakdownHtml+=`<div style="margin-top:12px;font-size:12px;color:var(--red);">${tt({pl:'Nie da się trafić dokładnie',en:'Cannot reach exactly',de:'Genaues Gewicht nicht erreichbar',es:'No se puede alcanzar exactamente'})}: ${r.actual.toFixed(2)}kg (${tt({pl:'brakuje',en:'missing',de:'fehlt',es:'falta'})} ${(r.remaining*2).toFixed(2)}kg)</div>`;
      }
    }
    ov.innerHTML=`<div class="modal" style="max-height:88dvh;overflow-y:auto;">
      <div class="modal-handle"></div>
      <div class="modal-title">${tt({pl:'Kalkulator talerzy',en:'Plate Calculator',de:'Hantelscheiben-Rechner',es:'Calculadora de discos'})}</div>
      <label class="form-label">${tt({pl:'Waga docelowa (kg)',en:'Target weight (kg)',de:'Zielgewicht (kg)',es:'Peso objetivo (kg)'})}</label>
      <input type="number" id="pcTarget" value="${target}" step="0.5" style="margin-bottom:14px;"/>
      <label class="form-label">${tt({pl:'Gryf (kg)',en:'Bar (kg)',de:'Stange (kg)',es:'Barra (kg)'})}</label>
      <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;">
        ${[20,15,10,7.5].map(b=>`<button class="btn btn-sm ${b===bar?'btn-primary':'btn-ghost'}" onclick="window.pcSetBar(${b})" style="padding:9px 14px;flex:1;min-width:0;">${b}kg</button>`).join('')}
      </div>
      ${breakdownHtml}
      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:18px;">${tt({pl:'Zamknij',en:'Close',de:'Schließen',es:'Cerrar'})}</button>
    </div>`;
    const inp=document.getElementById('pcTarget');
    if(inp)inp.oninput=e=>{target=+e.target.value||0;render();};
  }
  document.body.appendChild(ov);S.modal=ov;

// ===== WORKOUT =====
function startWorkout(tidOrTpl){
  // Accepts either a template ID (from S.templates) or a template object directly (e.g. from a Program).
  const tp=(typeof tidOrTpl==='object'&&tidOrTpl)?tidOrTpl:S.templates.find(x=>x.id===tidOrTpl);
  if(!tp)return;
  S.activeWorkout={templateId:tp.id||null,name:tp.name,types:tp.types||[],startTime:Date.now(),restDefault:tp.restDefault||90,
    exercises:tp.exercises.map(e=>({...e,sets:Array.from({length:e.sets},()=>({reps:e.reps,weight:e.weight,done:false,rest:tp.restDefault||90}))}))};
  showScreen('workouts');
}

function renderWorkout(){
  const el=document.getElementById('workoutContent');
  if(!S.activeWorkout){
    el.innerHTML=`<div style="padding:4px 0 12px;"><div style="font-size:17px;font-weight:700;margin-bottom:14px;">${t('workout')}</div><div style="margin-bottom:14px;font-size:14px;color:var(--text2);">${t('selectTemplate')}</div>${S.templates.map(tp=>`<div class="workout-row" onclick="startWorkout(${tp.id})" style="margin-bottom:8px;"><div class="workout-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M6 4v16M18 4v16M3 12h18M3 7h3M18 7h3M3 17h3M18 17h3"/></svg></div><div class="workout-row-info"><div class="workout-row-name">${tp.name}</div><div class="workout-row-meta">${tp.exercises.length} ${t('exExercises')} · ${t('exRest')} ${tp.restDefault}s</div></div><div>${typeTagHtml(tp.types||[])}</div></div>`).join('')}</div>`;
    return;
  }
  const w=S.activeWorkout;
  const elapsed=Math.max(0,Math.floor((Date.now()-w.startTime)/60000));
  const done=w.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
  const total=w.exercises.reduce((a,ex)=>a+ex.sets.length,0);
  const pct=total?Math.round(done/total*100):0;
  const finishFn=w.isQuick?'finishQuickWorkout()':'finishWorkout()';
  let h=`<div class="workout-header"><div style="flex:1;"><div style="font-size:19px;font-weight:700;">${displayWorkoutName(w)}${w.isQuick?` <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);vertical-align:middle;">${t('quickWorkout')}</span>`:''}</div><div style="font-size:12px;color:var(--text2);margin-top:3px;">${elapsed} min · ${done}/${total} ${t('exSets')}</div><div style="margin-top:8px;height:4px;background:var(--bg4);border-radius:2px;width:100%;max-width:220px;"><div style="height:4px;background:var(--accent);border-radius:2px;width:${pct}%;transition:width 0.3s;"></div></div></div><button onclick="showPlateCalc()" aria-label="Plate calculator" style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;width:42px;height:42px;cursor:pointer;color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="3" height="6" rx="0.5"/><rect x="19" y="9" width="3" height="6" rx="0.5"/><rect x="6" y="6" width="2.5" height="12" rx="0.5"/><rect x="15.5" y="6" width="2.5" height="12" rx="0.5"/><line x1="8.5" y1="12" x2="15.5" y2="12"/></svg></button></div>`;
  w.exercises.forEach((ex,ei)=>{
    h+=`<div class="ex-card${ex.sup?' super':''}"><div class="ex-card-header"><div style="display:flex;align-items:center;gap:7px;flex:1;">${ex.sup?'<span class="super-tag">SS</span>':''}<span style="font-size:14px;font-weight:700;">${exName(ex)}</span></div></div><div class="set-grid-labels"><div></div><div class="set-lbl">${t('kg')}</div><div class="set-lbl">${t('reps')}</div><div class="set-lbl">${t('exRest')}</div><div class="set-lbl">RPE</div><div></div><div></div></div>`;
    ex.sets.forEach((s,si)=>{h+=`<div class="set-grid"><div class="set-num">${si+1}</div><input class="si" type="number" value="${s.weight}" onchange="upd(${ei},${si},'weight',this.value)"/><input class="si" type="number" value="${s.reps}" onchange="upd(${ei},${si},'reps',this.value)"/><input class="si" type="number" value="${s.rest}" onchange="upd(${ei},${si},'rest',this.value)"/><input class="si" type="number" min="1" max="10" step="0.5" value="${s.rpe||''}" placeholder="—" onchange="upd(${ei},${si},'rpe',this.value)"/><button class="set-done ${s.done?'completed':''}" onclick="toggleSet(${ei},${si})">${s.done?'✓':'○'}</button><button class="rm-btn" onclick="removeSet(${ei},${si})">✕</button></div>`;});
    h+=`<button class="btn btn-sm btn-ghost" style="font-size:12px;padding:6px 12px;margin-top:6px;width:100%;justify-content:center;" onclick="addSet(${ei})">+ ${t('addSet')}</button>`;
    h+=`</div>`;
  });
  h+=`<div style="height:90px;"></div>`;
  h+=`<div class="workout-actions-bar">`;
  h+=`<button class="workout-action-btn danger" onclick="cancelWorkout()">${t('cancelWorkout')}</button>`;
  if(w.isQuick) h+=`<button class="workout-action-btn" onclick="addExToQuickWorkout()">${t('addExerciseToWorkout')}</button>`;
  h+=`<button class="workout-action-btn primary" onclick="${finishFn}">${t('finish')}</button>`;
  h+=`</div>`;
  el.innerHTML=h;
  // If timer was running, re-insert timer bar (DOM was rebuilt)
  if(S.timerSecs>0) _renderTimerBar();
}

function upd(ei,si,f,v){S.activeWorkout.exercises[ei].sets[si][f]=+v;}
function toggleSet(ei,si){const s=S.activeWorkout.exercises[ei].sets[si];s.done=!s.done;if(s.done)startTimer(s.rest||S.activeWorkout.restDefault);else stopTimer();renderWorkout();}
function addSet(ei){const ex=S.activeWorkout.exercises[ei];const last=ex.sets[ex.sets.length-1]||{reps:ex.reps,weight:ex.weight};ex.sets.push({reps:last.reps,weight:last.weight,done:false,rest:S.activeWorkout.restDefault});renderWorkout();}
function removeSet(ei,si){const ex=S.activeWorkout.exercises[ei];if(ex.sets.length<=1)return;ex.sets.splice(si,1);renderWorkout();}
function startTimer(s){
  stopTimer();
  S.timerSecs=s;
  // Insert or show timer bar immediately
  _renderTimerBar();
  S.timerInterval=setInterval(()=>{
    S.timerSecs--;
    if(S.timerSecs<=0){
      stopTimer();
      // Remove timer bar without rebuilding whole workout
      const tb=document.getElementById('workoutTimerBar');
      if(tb)tb.remove();
    } else {
      _renderTimerBar();
    }
  },1000);
}

function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  S.timerSecs=0;
  const tb=document.getElementById('workoutTimerBar');
  if(tb)tb.remove();
}

function _renderTimerBar(){
  const min=Math.floor(S.timerSecs/60);
  const sec=String(S.timerSecs%60).padStart(2,'0');
  let tb=document.getElementById('workoutTimerBar');
  if(!tb){
    // Create and insert after workout header
    tb=document.createElement('div');
    tb.id='workoutTimerBar';
    const wc=document.getElementById('workoutContent');
    const header=wc?.querySelector('.workout-header');
    if(header)header.after(tb);
    else if(wc)wc.prepend(tb);
  }
  tb.className='timer-bar';
  tb.innerHTML=`<div class="timer-display">${min}:${sec}</div><div class="timer-label">${t('restBreak')}</div><button class="btn btn-sm btn-ghost" style="margin-top:10px;" onclick="stopTimer()">${t('skipRest')}</button>`;
}

function finishWorkout(){
  stopTimer();const w=S.activeWorkout;
  const duration=Math.max(1,Math.floor((Date.now()-w.startTime)/60000));
  let volume=0;w.exercises.forEach(ex=>ex.sets.forEach(s=>{if(s.done&&s.weight>0)volume+=s.weight*s.reps;}));
  const k=today()+'_'+Date.now();
  S.workouts[k]={templateId:w.templateId,name:w.name,nameKey:w.nameKey||null,types:w.types,volume,duration,date:today(),exercises:w.exercises.map(ex=>({id:ex.id,pl:ex.pl,en:ex.en,name:ex.name,sup:ex.sup,gk:ex.gk,equipment:ex.equipment,sets:ex.sets}))};
  S.activeWorkout=null;saveAll();showWorkoutSummary(k);S.selectedDate=today();showScreen('calendar');
}
function cancelWorkout(){stopTimer();S.activeWorkout=null;renderWorkout();}

// ===== SUMMARY =====
function showWorkoutSummary(key){
  const w=S.workouts[key];if(!w)return;
  const prev=getPrev(key,w.templateId);
  const vd=prev?+(w.volume/1000-prev.volume/1000).toFixed(1):null;
  const dd=prev?w.duration-prev.duration:null;
  const dateStr=w.date||key.split('_')[0];
  const[y,m,d]=dateStr.split('-');
  closeModal();
  const dH=(val,unit,inv)=>{if(val===null)return`<div style="font-size:12px;color:var(--text2);">${t('firstEver')}</div>`;const good=inv?val<0:val>0;return`<div class="${good?'delta-up':'delta-down'}">${val>0?'+':''}${val}${unit} ${t('vsLast')}</div>`;};
  let exBreakdown='';
  if(w.exercises&&w.exercises.length){
    const rows=w.exercises.map(ex=>{
      const sets=Array.isArray(ex.sets)?ex.sets:[];
      // Count only done sets (consistent with stored w.volume)
      let vol=0,bestE1=0,bestSetTxt='';
      for(const s of sets){
        const done=s.done===true||s.done===undefined;
        const wt=+(s.weight||0),r=+(s.reps||0);
        if(!done||wt<=0)continue;
        vol+=wt*r;
        const e=epleyEst1RM(wt,r);
        if(e>bestE1){bestE1=e;bestSetTxt=`${wt}×${r}`;}
      }
      if(!vol)return'';
      const nm=ex[lang]||ex.pl||ex.name||'';
      const e1Html=bestE1?`<div style="font-size:11px;color:var(--text3);margin-top:2px;">${bestSetTxt} · e1RM ${bestE1}kg</div>`:'';
      return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start;"><div style="font-size:13px;color:var(--text2);flex:1;padding-right:8px;min-width:0;"><div>${nm}</div>${e1Html}</div><div style="font-size:13px;font-weight:600;flex-shrink:0;">${vol.toLocaleString()} kg</div></div>`;
    }).filter(Boolean).join('');
    if(rows)exBreakdown=`<div style="font-size:13px;font-weight:600;margin:16px 0 8px;">${t('volPerEx')}</div><div style="background:var(--bg3);border-radius:10px;padding:0 12px;">${rows}</div>`;
  }
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><div class="modal-title" style="margin-bottom:0;">${t('summary')} ${d}.${m}.${y}</div><button class="btn btn-sm btn-ghost" onclick="closeModal()">✕</button></div><div style="font-size:13px;color:var(--text2);margin-bottom:14px;">${displayWorkoutName(w)}</div><div class="summary-grid"><div class="metric-card"><div class="metric-label">${t('totalLifted')}</div><div class="metric-value" style="font-size:22px;">${w.volume.toLocaleString()}</div><div style="font-size:11px;color:var(--text2);margin-top:2px;">kg</div>${dH(vd,'t',false)}</div><div class="metric-card"><div class="metric-label">${t('time')}</div><div class="metric-value">${w.duration}</div><div style="font-size:11px;color:var(--text2);margin-top:2px;">min</div>${dH(dd,'min',true)}</div></div>${exBreakdown}<div style="font-size:13px;font-weight:600;margin:16px 0 10px;">${t('objetosc')} — ${displayWorkoutName(w)}</div><div style="position:relative;width:100%;height:180px;margin-bottom:16px;"><canvas id="summChart"></canvas></div>${prev?`<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);">${t('prevWorkout')} ${prev.volume.toLocaleString()} kg · ${prev.duration} min</div>`:`<div style="font-size:13px;color:var(--text2);text-align:center;padding:8px 0;">${t('firstWorkout')}</div>`}
    <button class="btn btn-danger" style="margin-top:14px;" onclick="deleteWorkout('${key}')">${lang==='pl'?'Usuń trening':'Delete workout'}</button>
  </div>`;
  document.body.appendChild(ov);S.modal=ov;
  setTimeout(()=>{
    const ctx=document.getElementById('summChart');if(!ctx)return;
    const histData=w.templateId?getProgress(w.templateId,key):[];
    if(histData.length>=2){
      // Multiple sessions of this template — show history line chart
      new Chart(ctx,{type:'line',data:{labels:histData.map(x=>x.l),datasets:[{data:histData.map(x=>x.v),borderColor:'#c9a96e',backgroundColor:'rgba(201,169,110,0.07)',borderWidth:2.5,pointBackgroundColor:'#c9a96e',pointRadius:histData.map((_,i)=>i===histData.length-1?7:4),fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(1)+'t':v+'kg'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    } else {
      // No history (Quick Workout or first session) — show per-exercise bar chart for this workout
      const exData=(w.exercises||[]).map(ex=>{
        let vol=0;
        for(const s of (ex.sets||[])){
          const done=s.done===true||s.done===undefined;
          const wt=+(s.weight||0),r=+(s.reps||0);
          if(done&&wt>0&&r>0)vol+=wt*r;
        }
        return{l:ex[lang]||ex.pl||ex.name||'',v:vol};
      }).filter(x=>x.v>0);
      if(!exData.length)return;
      new Chart(ctx,{type:'bar',data:{labels:exData.map(x=>x.l.length>14?x.l.slice(0,13)+'…':x.l),datasets:[{data:exData.map(x=>x.v),backgroundColor:'rgba(201,169,110,0.65)',borderColor:'#c9a96e',borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(1)+'t':v+'kg'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    }
  },100);
}
function getPrev(key,tid){
  if(!tid)return null;
  const dateOfKey=key.split('_')[0];
  const s=Object.entries(S.workouts)
    .filter(([k,w])=>w.templateId===tid&&k.split('_')[0]<dateOfKey)
    .sort((a,b)=>a[0]>b[0]?1:-1);
  return s.length?s[s.length-1][1]:null;
}
function getProgress(tid,upTo){
  if(!tid)return[];
  const upToDate=upTo.split('_')[0];
  return Object.entries(S.workouts)
    .filter(([k,w])=>w.templateId===tid&&k.split('_')[0]<=upToDate)
    .sort((a,b)=>a[0]>b[0]?1:-1)
    .slice(-8)
    .map(([k,w])=>{const d=(w.date||k.split('_')[0]);const[,m,dd]=d.split('-');return{l:`${dd}.${m}`,v:w.volume};});
}

  const chartSections=MEASURE_TYPES.map(mt=>{
    const data=entries.filter(([,r])=>r[mt.key]!=null).reverse().map(([date,r])=>{const[y,m,d]=date.split('-');return{l:`${d}.${m}`,v:r[mt.key]};}).slice(-10);

  // History
  const history=entries.slice(0,5).map(([date,rec])=>`<div style="position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;padding-right:48px;margin-bottom:8px;"><div style="font-size:12px;color:var(--text2);margin-bottom:6px;">${date}</div><div style="display:flex;flex-wrap:wrap;gap:10px;">${MEASURE_TYPES.filter(mt=>rec[mt.key]!=null).map(mt=>`<span style="font-size:13px;"><span style="color:var(--text2);">${t(mt.key)}:</span> <strong>${rec[mt.key]} ${mt.unit}</strong></span>`).join('')}</div><button class="rm-btn" style="position:absolute;top:6px;right:6px;width:36px;height:36px;font-size:15px;" onclick="deleteMeasurement('${date}')" aria-label="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>`).join('');

  el.innerHTML=`${proCard}${toolsCard}${cards}${chartSections?`<div style="margin-top:20px;">${chartSections}</div>`:''}<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${lang==='pl'?'Historia pomiarów':'Measurement history'}</div>${history}`;

  // Render each chart
  setTimeout(()=>{
    MEASURE_TYPES.forEach(mt=>{
      const data=entries.filter(([,r])=>r[mt.key]!=null).reverse().map(([date,r])=>{const[y,m,d]=date.split('-');return{l:`${d}.${m}`,v:r[mt.key]};}).slice(-10);
      if(data.length<2)return;
      const ctx=document.getElementById('chart_'+mt.key);if(!ctx)return;
      new Chart(ctx,{type:'line',data:{labels:data.map(x=>x.l),datasets:[{data:data.map(x=>x.v),borderColor:'#c9a96e',backgroundColor:'rgba(201,169,110,0.07)',borderWidth:2,pointBackgroundColor:'#c9a96e',pointRadius:data.map((_,i)=>i===data.length-1?6:3),fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{font:{size:10},callback:v=>v+mt.unit}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    });
  },100);
}

function openAddMeasure(){

function showMonthChart(){
  const now=new Date();
  let chartYear=now.getFullYear();
  let chartMonth=now.getMonth();

  function buildChart(){
    closeModal();
    const ov=document.createElement('div');ov.className='modal-overlay';
    const daysInMonth=new Date(chartYear,chartMonth+1,0).getDate();
    const monthLabel=t('months')[chartMonth]+' '+chartYear;

    // Aggregate per day
    const perDay=Array.from({length:daysInMonth},(_,i)=>{
      const dateStr=dk(chartYear,chartMonth,i+1);
      const dayEntries=Object.entries(S.workouts).filter(([k,w])=>(w.date||k.split('_')[0])===dateStr);
      return{
        d:i+1,
        count:dayEntries.length,
        mins:dayEntries.reduce((a,[,w])=>a+(w.duration||0),0),
        vol:dayEntries.reduce((a,[,w])=>a+(w.volume||0),0)
      };
    });

    const totalCount=perDay.reduce((a,d)=>a+d.count,0);
    const totalMins=perDay.reduce((a,d)=>a+d.mins,0);
    const totalVol=perDay.reduce((a,d)=>a+d.vol,0);

    ov.innerHTML=`<div class="modal" style="max-height:92dvh;">
      <div class="modal-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <button onclick="prevChartMonth()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;">‹</button>
        <div style="font-size:16px;font-weight:700;">${monthLabel}</div>
        <button onclick="nextChartMonth()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;">›</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:16px;justify-content:center;">
        <span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#c9a96e;display:inline-block;"></span>${lang==='pl'?'Treningi':'Workouts'}</span>
        <span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#64c8ff;display:inline-block;"></span>${lang==='pl'?'Czas (min)':'Time (min)'}</span>
        <span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#78c878;display:inline-block;"></span>${lang==='pl'?'Objętość (t)':'Volume (t)'}</span>
      </div>
      <div style="position:relative;width:100%;height:220px;margin-bottom:20px;"><canvas id="monthChart"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
        <div class="metric-card" style="text-align:center;">
          <div class="metric-label">${lang==='pl'?'Treningi':'Workouts'}</div>
          <div class="metric-value">${totalCount}</div>
        </div>
        <div class="metric-card" style="text-align:center;">
          <div class="metric-label">${lang==='pl'?'Czas':'Time'}</div>
          <div class="metric-value" style="font-size:20px;">${totalMins}</div>
          <div style="font-size:11px;color:var(--text2);">min</div>
        </div>
        <div class="metric-card" style="text-align:center;">
          <div class="metric-label">${lang==='pl'?'Objętość':'Volume'}</div>
          <div class="metric-value" style="font-size:20px;">${(totalVol/1000).toFixed(1)}</div>
          <div style="font-size:11px;color:var(--text2);">ton</div>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancelTemplate')}</button>
    </div>`;
    document.body.appendChild(ov);S.modal=ov;

    setTimeout(()=>{
      const ctx=document.getElementById('monthChart');if(!ctx)return;
      const labels=perDay.map(d=>d.d);
      new Chart(ctx,{
        type:'bar',
        data:{
          labels,
          datasets:[
            {label:lang==='pl'?'Treningi':'Workouts',data:perDay.map(d=>d.count),backgroundColor:'rgba(201,169,110,0.8)',borderRadius:3,yAxisID:'y'},
            {label:lang==='pl'?'Czas (min)':'Time (min)',data:perDay.map(d=>d.mins),backgroundColor:'rgba(100,200,255,0.7)',borderRadius:3,yAxisID:'y2'},
            {label:lang==='pl'?'Objętość (t)':'Volume (t)',data:perDay.map(d=>+(d.vol/1000).toFixed(2)),backgroundColor:'rgba(120,200,120,0.7)',borderRadius:3,yAxisID:'y3'},
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const ds=ctx.dataset.label;return`${ds}: ${ctx.raw}`;}}}},
          scales:{
            x:{grid:{display:false},ticks:{font:{size:9},maxRotation:0}},
            y:{display:false,beginAtZero:true},
            y2:{display:false,beginAtZero:true},
            y3:{display:false,beginAtZero:true},
          }
        }
      });
    },100);
  }

  window.prevChartMonth=()=>{chartMonth--;if(chartMonth<0){chartMonth=11;chartYear--;}buildChart();};
  window.nextChartMonth=()=>{chartMonth++;if(chartMonth>11){chartMonth=0;chartYear++;}buildChart();};
  buildChart();
}

        <div style="margin-bottom:12px;"><select style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;font-size:15px;color:var(--text);width:100%;font-family:inherit;"
          onchange="window.mwTplId=+this.value;window.mwExercises=[];window.renderMw()">${tplSel}</select></div>
        <label class="form-label">${L?'Czas (min)':'Duration (min)'}</label>
        <div style="margin-bottom:12px;"><input type="number" value="${window.mwDuration}" min="1" style="width:100px;"
